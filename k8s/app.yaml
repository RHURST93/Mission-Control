
apiVersion: apps/v1
kind: Deployment
metadata: { name: fusion }
spec:
  selector: { matchLabels: { app: fusion } }
  template:
    metadata: { labels: { app: fusion } }
    spec:
      containers:
      - name: fusion
        image: fusion-service:latest
        imagePullPolicy: Never
---
apiVersion: v1
kind: Service
metadata: { name: fusion }
spec:
  type: NodePort
  selector: { app: fusion }
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30008
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: frontend }
spec:
  selector: { matchLabels: { app: frontend } }
  template:
    metadata: { labels: { app: frontend } }
    spec:
      containers:
      - name: frontend
        image: frontend:latest
        imagePullPolicy: Never
---
apiVersion: v1
kind: Service
metadata: { name: frontend }
spec:
  type: NodePort
  selector: { app: frontend }
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30007
